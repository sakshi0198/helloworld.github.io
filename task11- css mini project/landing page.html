<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala 7 Sneaker Store</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Navbar -->

    <nav>

        <div class="logo">
            Thala <span>7.</span>
        </div>

        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Brands</a></li>
            <li><a href="#">More</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-icons">

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search">
            </div>

            <i class="fa-solid fa-cart-shopping"></i>

            <img src="https://i.pravatar.cc/40" alt="profile">

        </div>

    </nav>


    <!-- Hero Section -->

    <section class="hero">

        <div class="hero-text">

            <p class="brand">SEVEN™ BY MSD</p>

            <h1>
                7!! Thala For <br>
                <span>a Reason!</span>
            </h1>

            <p>
                Discover premium sneakers built for comfort,
                performance and style. Shop your favourite pair today.
            </p>

            <button>Shop Now</button>

        </div>

        <div class="hero-image">

            <img src="https://pngimg.com/uploads/running_shoes/running_shoes_PNG5816.png" alt="shoe">

        </div>

    </section>

</div>


<!-- Services -->

<section class="services">

    <div class="service-box">
        <i class="fa-regular fa-heart"></i>
        <div>
            <h2>2k+</h2>
            <p>Reviews</p>
        </div>
    </div>

    <div class="service-box">
        <i class="fa-solid fa-users"></i>
        <div>
            <h2>30k+</h2>
            <p>Customers</p>
        </div>
    </div>

    <div class="service-box">
        <i class="fa-solid fa-award"></i>
        <div>
            <h2>High</h2>
            <p>Quality</p>
        </div>
    </div>

    <div class="service-box">
        <i class="fa-regular fa-star"></i>
        <div>
            <h2>4.5/5</h2>
            <p>Rating</p>
        </div>
    </div>

</section>

</body>
</html>
