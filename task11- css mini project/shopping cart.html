<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala 7 Sneaker Store</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Navbar -->

    <nav>

        <div class="logo">
            Thala <span>7.</span>
        </div>

        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Brands</a></li>
            <li><a href="#">More</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-icons">

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search">
            </div>

            <i class="fa-solid fa-cart-shopping"></i>

            <img src="https://i.pravatar.cc/40" alt="profile">

        </div>

    </nav>

    <!-- Shopping Cart -->

    <section class="cart-page">

        <!-- Left -->

        <div class="cart-left">

            <h1>Shopping Cart</h1>

            <table>

                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th></th>
                </tr>

                <tr>
                    <td>Seven By M.S.Dhoni Shoes</td>
                    <td>- &nbsp; 1 &nbsp; +</td>
                    <td>₹4,999</td>
                    <td><i class="fa-solid fa-xmark remove"></i></td>
                </tr>

                <tr>
                    <td>Seven By M.S.Dhoni Shoes</td>
                    <td>- &nbsp; 1 &nbsp; +</td>
                    <td>₹4,999</td>
                    <td><i class="fa-solid fa-xmark remove"></i></td>
                </tr>

                <tr>
                    <td>Seven By M.S.Dhoni Shoes</td>
                    <td>- &nbsp; 1 &nbsp; +</td>
                    <td>₹4,999</td>
                    <td><i class="fa-solid fa-xmark remove"></i></td>
                </tr>

            </table>

            <a href="#" class="continue">
                <i class="fa-solid fa-chevron-left"></i>
                Continue Shopping
            </a>

        </div>

        <!-- Right -->

        <div class="cart-right">

            <div class="summary">

                <label>Enter Coupon Code</label>

                <div class="coupon">

                    <input type="text" placeholder="COUPON CODE">

                    <button>Apply Coupon</button>

                </div>

                <div class="bill">

                    <p><span>Sub Total</span><span>₹4,700</span></p>

                    <p><span>Taxes</span><span>₹199</span></p>

                    <p><span>Discount</span><span>₹0</span></p>

                    <hr>

                    <h3><span>Total</span><span>₹4,999</span></h3>

                </div>

            </div>

            <button class="pay-btn">
                Pay Now ₹4,999
            </button>

            <div class="payment-icons">

                <i class="fa-brands fa-cc-visa"></i>

                <i class="fa-brands fa-cc-mastercard"></i>

                <i class="fa-brands fa-google-pay"></i>

                <i class="fa-solid fa-shield-halved"></i>

            </div>

        </div>

    </section>

</div>
