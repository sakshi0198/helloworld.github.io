<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Mart Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">

        <img
        src="../task6/images/laundry.png"
        alt="Laundry">

    </div>

    <div class="right">

        <div class="login-box">

            <h1>Hello Again!</h1>

            <p class="subtitle">
                Welcome back! we missed you!
            </p>

            <form>

                <label>Email</label>

                <input
                type="email"
                placeholder="Emailid@site.com"
                required>

                <label>Password</label>

                <input
                type="password"
                placeholder="Password"
                required>

                <div class="forgot">
                    <a href="#">Forgot Password</a>
                </div>

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="register">
                Not a member?
                <a href="#">Register Now</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
